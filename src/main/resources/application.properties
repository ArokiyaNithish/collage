# ── Server ──────────────────────────────────────────────────
server.port=8080

# ── SQL Server Datasource ────────────────────────────────────
spring.datasource.url=jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=WorkshopDB;encrypt=false;trustServerCertificate=true
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.datasource.username=sa
spring.datasource.password=Workshop@123

# ── JPA / Hibernate ────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT Settings ────────────────────────────────────────────
app.jwt.secret=VGhpcxNJc015U2VjcmV0S2V5Rm9yV29ya3Nob3BNYW5hZ2VtZW50U3lzdGVtMjAyNA==
app.jwt.expiration=86400000

# ── Jackson ────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata

# ── Static Resources ────────────────────────────────────────
spring.web.resources.static-locations=classpath:/static/
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true

# ── Logging ─────────────────────────────────────────────────
logging.level.com.workshop=DEBUG
logging.level.org.springframework.security=WARN
