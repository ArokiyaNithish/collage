<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard (Thymeleaf Demo)</title>
    <!-- Simple CSS3 for styling -->
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            padding: 40px 20px; 
        }
        .container { 
            max-width: 900px; 
            margin: auto; 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        h1 { 
            color: #2c3e50; 
            margin-top: 0;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        p.subtitle {
            color: #7f8c8d;
            font-size: 1.1em;
            margin-bottom: 25px;
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 20px; 
        }
        th, td { 
            padding: 15px; 
            text-align: left; 
            border-bottom: 1px solid #e0e0e0; 
        }
        th { 
            background-color: #3498db; 
            color: #ffffff; 
            font-weight: 600;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover { 
            background-color: #f1f8ff; 
        }
        .badge {
            background: #e74c3c;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Thymeleaf Admin Dashboard</h1>
        <p class="subtitle">This page securely demonstrates HTTP Basic authentication, Spring MVC Native Controllers, and Thymeleaf parsing.</p>
        
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Full Name</th>
                    <th>Email Address</th>
                    <th>Role</th>
                </tr>
            </thead>
            <tbody>
                <!-- Iterates over the 'users' attribute provided by AdminViewController -->
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}">1</td>
                    <td th:text="${user.fullName}">Example User</td>
                    <td th:text="${user.email}">example@email.com</td>
                    <td>
                        <span th:text="${user.role}" 
                              th:classappend="${#strings.equals(user.role, 'ADMIN')} ? 'badge' : ''">ROLE</span>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="4" style="text-align: center; color: #7f8c8d;">No users found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
